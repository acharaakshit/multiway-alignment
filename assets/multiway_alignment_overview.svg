<svg width="920" height="430" viewBox="0 0 920 430" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Multi-way representation alignment overview</title>
  <desc id="desc">Several representation spaces are aligned through a shared universe, replacing pairwise maps with one map per space.</desc>
  <defs>
    <linearGradient id="universe" x1="360" y1="112" x2="560" y2="312" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#EEF2FF"/>
      <stop offset="0.52" stop-color="#E7F7F1"/>
      <stop offset="1" stop-color="#FFF4DD"/>
    </linearGradient>
    <linearGradient id="panel" x1="42" y1="28" x2="878" y2="392" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FAFC"/>
      <stop offset="1" stop-color="#FFFFFF"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#0F172A" flood-opacity="0.10"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="9" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2 2 L10 6 L2 10" stroke="#475569" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      .label { font: 650 18px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0F172A; }
      .small { font: 500 13px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #475569; }
      .tiny { font: 650 12px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #64748B; letter-spacing: .06em; }
      .spaceText { font: 700 15px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
      .math { font: 700 18px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0F172A; }
      .mapStroke { stroke: #475569; stroke-width: 2.4; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect x="24" y="20" width="872" height="390" rx="22" fill="url(#panel)" stroke="#E2E8F0"/>
  <text x="460" y="62" text-anchor="middle" class="small">Learn one map per representation space through a shared universe.</text>

  <g filter="url(#softShadow)">
    <circle cx="460" cy="206" r="82" fill="url(#universe)" stroke="#334155" stroke-width="2"/>
    <circle cx="460" cy="206" r="50" fill="#FFFFFF" fill-opacity="0.72" stroke="#CBD5E1"/>
    <text x="460" y="198" text-anchor="middle" class="label">Shared</text>
    <text x="460" y="222" text-anchor="middle" class="label">Universe</text>
    <text x="460" y="250" text-anchor="middle" class="tiny">GPA / GCCA / GCPA</text>
  </g>

  <g>
    <path d="M216 132 C282 136 344 158 389 183" class="mapStroke"/>
    <path d="M217 300 C280 284 344 257 388 230" class="mapStroke"/>
    <path d="M703 132 C640 137 578 158 530 183" class="mapStroke"/>
    <path d="M703 300 C640 284 577 257 531 230" class="mapStroke"/>
  </g>

  <g filter="url(#softShadow)">
    <rect x="86" y="104" width="138" height="72" rx="16" fill="#DBEAFE" stroke="#3B82F6"/>
    <text x="155" y="134" text-anchor="middle" class="spaceText">X<tspan baseline-shift="sub" font-size="11">1</tspan></text>
    <text x="155" y="157" text-anchor="middle" class="small">model / view 1</text>

    <rect x="86" y="256" width="138" height="72" rx="16" fill="#DCFCE7" stroke="#22C55E"/>
    <text x="155" y="286" text-anchor="middle" class="spaceText">X<tspan baseline-shift="sub" font-size="11">2</tspan></text>
    <text x="155" y="309" text-anchor="middle" class="small">model / view 2</text>

    <rect x="696" y="104" width="138" height="72" rx="16" fill="#FFE4E6" stroke="#F43F5E"/>
    <text x="765" y="134" text-anchor="middle" class="spaceText">X<tspan baseline-shift="sub" font-size="11">3</tspan></text>
    <text x="765" y="157" text-anchor="middle" class="small">model / view 3</text>

    <rect x="696" y="256" width="138" height="72" rx="16" fill="#FEF3C7" stroke="#F59E0B"/>
    <text x="765" y="286" text-anchor="middle" class="spaceText">X<tspan baseline-shift="sub" font-size="11">M</tspan></text>
    <text x="765" y="309" text-anchor="middle" class="small">model / view M</text>
  </g>

  <g>
    <rect x="334" y="340" width="252" height="54" rx="14" fill="#FFFFFF" stroke="#CBD5E1"/>
    <text x="460" y="359" text-anchor="middle" class="small">Universe factorization</text>
    <text x="460" y="379" text-anchor="middle" class="math">O(M) maps</text>
</g>
</svg>
