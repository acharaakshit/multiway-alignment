experiment:
  seed: 42
  dataset: cifar100
  output_dir: ./results/semanticity
  data_dir: ${oc.env:DATA_PATH}/cifar100/
  pca_enabled: false
  stratified: false
  sample_counts: [45000]
  add_model: true

splits: [train, validation, test]

data:
  validation_size: 5000
  stratify_column: fine_label

transforms:
  canny:
    auto_k: 0.5
    thicken: 1
    p_corruption: 0.85
    p_complete: 1.0
  scharr:
    thicken: 1
    p_corruption: 0.85
    p_complete: 1.0
  dog:
    sigma1: 1.0
    sigma2: 2.5
    p_corruption: 0.85
    p_complete: 1.0
  gaussian:
    blur_sigma: 10
    noise_std: 25.0
    p_corruption: 0.85
    p_complete: 1.0


experiments:
  addition311:
    modes: [complete]
    kinds: [colour]
    encoders:
      - [facebook/dinov3-vitl16-pretrain-lvd1689m, facebook/convnext-large-224, microsoft/resnet-50]
    added_model: google/vit-base-patch16-224

  addition312:
    modes: [complete]
    kinds: [colour]
    encoders:
      - [facebook/dinov2-base, openai/clip-vit-base-patch32, google/vit-base-patch16-224]
    added_model: microsoft/swin-tiny-patch4-window7-224
    
  addition511:
    modes: [complete]
    kinds: [colour]
    encoders:
      - [facebook/convnext-large-224, facebook/dinov2-large, openai/clip-vit-base-patch32, google/vit-base-patch16-224, microsoft/swin-large-patch4-window12-384-in22k]
    added_model: microsoft/resnet-18

  addition512:
    modes: [complete]
    kinds: [colour]
    encoders:
      - [facebook/convnext-base-224, facebook/dinov3-vitl16-pretrain-lvd1689m, google/vit-base-patch16-224, openai/clip-vit-base-patch16, microsoft/resnet-34]
    added_model: google/mobilenet_v2_1.0_224

classifier:
  epochs: 100
  patience: 10
  lr: 0.001
